name: build-search

on:
  push:
    branches: [ main ]
    paths:
      - '**.html'
      - 'build-search.py'
      - 'build-consent.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-search-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Do not run on the bot's own commit. GITHUB_TOKEN pushes already do not
    # retrigger workflows, this is an extra safety guard against any loop.
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rebuild search index
        run: python build-search.py

      - name: Inject cookie consent banner
        run: python build-consent.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: rebuild search index + consent banner"
            git push
          fi
