<style>
  :root {
    --black: #0a0c0e;
    --gold: #c4a265;
    --gold-light: #d4b87e;
    --gold-dim: rgba(196,162,101,0.18);
    --muted: rgba(255,255,255,0.72);
    --border: rgba(255,255,255,0.06);
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; min-height:100%;
    background:var(--black);
    color:#fff;
    font-family:'Poppins',sans-serif;
  }
  body { overflow-x:hidden; }

  #topo-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

  .ambient-tl {
    position:fixed; left:-15%; top:-10%; width:55vw; height:55vh;
    background:radial-gradient(ellipse, rgba(196,162,101,0.06) 0%, transparent 70%);
    pointer-events:none; z-index:0;
    animation:breathe 9s ease-in-out infinite;
  }
  .ambient-br {
    position:fixed; right:-10%; bottom:-5%; width:50vw; height:50vh;
    background:radial-gradient(ellipse, rgba(196,162,101,0.04) 0%, transparent 70%);
    pointer-events:none; z-index:0;
    animation:breathe 12s ease-in-out infinite reverse;
  }
  @keyframes breathe {
    0%,100%{transform:scale(1);opacity:1;}
    50%{transform:scale(1.08);opacity:0.7;}
  }

  /* ── NAV ── */
  .nav {
    position:fixed; top:0; left:0; right:0;
    display:flex; align-items:center; justify-content:space-between;
    padding:24px 36px; z-index:100;
    background:linear-gradient(to bottom, rgba(10,12,14,0.85), transparent);
    backdrop-filter:blur(8px);
  }
  .nav-logo {
    height:32px; object-fit:contain;
    filter:brightness(0) invert(1) opacity(0.85);
    cursor:pointer;
  }
  .nav-back {
    font-family:'Poppins',sans-serif; font-size:11px; font-weight:400;
    letter-spacing:0.18em; text-transform:uppercase;
    color:rgba(255,255,255,0.55);
    text-decoration:none;
    display:flex; align-items:center; gap:8px;
    transition:color 0.3s;
  }
  .nav-back:hover { color:rgba(255,255,255,0.95); }
  @media (max-width:640px) {
    .nav { padding:18px 20px; }
    .nav-logo { height:26px; }
    .nav-back { font-size:10px; letter-spacing:0.14em; }
  }

  /* ── MAIN STAGE ── */
  #app {
    position:relative; z-index:2;
    width:100%; min-height:100vh;
    display:flex; flex-direction:column;
    align-items:center;
    padding:90px 20px 100px;
  }

  .chat-stage {
    width:100%; max-width:780px;
    display:flex; flex-direction:column; align-items:center;
    flex:1;
  }

  .badge {
    font-family:'Poppins',sans-serif; font-size:9px; font-weight:400;
    letter-spacing:0.32em; text-transform:uppercase;
    color:var(--gold-light);
    padding:8px 18px;
    border:1px solid rgba(196,162,101,0.4);
    background:rgba(196,162,101,0.04);

  }
  @media (max-width:640px) { .badge { font-size:8px; letter-spacing:0.24em; padding:6px 14px; margin-bottom:18px; } }

  .main-title {
    font-family:'Playfair Display', serif;
    font-size:clamp(28px,5.4vw,52px);
    font-weight:300; letter-spacing:0.28em; text-transform:uppercase;
    color:#fff; text-align:center; margin-bottom:18px; line-height:1.15;
  }
  @media (max-width:640px) { .main-title { letter-spacing:0.18em; } }

  .main-subtitle {
    font-family:'Poppins',sans-serif; font-weight:300;
    font-size:13.5px; color:var(--muted); text-align:center;
    max-width:520px; line-height:1.75; margin-bottom:36px;
    letter-spacing:0.02em;
  }
  @media (max-width:640px) { .main-subtitle { font-size:13px; line-height:1.7; padding:0 8px; } }

  /* ── CONVERSATION ── */
  .conv-history {
    width:100%;

  /* Markdown */

  .msg-bubble li { margin-bottom:5px; line-height:1.7; }

  /* ── QUICK REPLIES (now ABOVE input) ── */

  .quick-replies-row {
    display:flex; flex-wrap:wrap; gap:8px;
    align-items:center;
  }
  .quick-reply-btn {
    font-family:'Poppins',sans-serif; font-size:12.5px; font-weight:400;
    color:rgba(255,255,255,0.85);
    background:rgba(196,162,101,0.08);
    border:1px solid rgba(196,162,101,0.3);
    padding:9px 16px; border-radius:20px;
    cursor:pointer;
    transition:all 0.18s;
    white-space:nowrap;
  }
  .quick-reply-btn:hover {
    background:rgba(196,162,101,0.18);
    border-color:rgba(196,162,101,0.6);
    color:#fff;
  }
  .quick-reply-btn.selected {

    border-color:var(--gold);
    color:#fff;

  .quick-reply-btn:disabled {

  .quick-replies-continue {
    font-family:'Poppins',sans-serif; font-size:11px; font-weight:500;
    letter-spacing:0.16em; text-transform:uppercase;
    color:#0a0c0e;

    border:none;
    padding:9px 18px; border-radius:20px;

    transition:all 0.18s;

  .quick-replies-continue:hover {

  .quick-replies-continue:disabled { opacity:0.3; cursor:default; }
  @media (max-width:640px) {

    .quick-replies-continue { font-size:10px; padding:8px 14px; letter-spacing:0.12em; }

  /* ── INPUT ── */
  .input-wrap {

    background:rgba(255,255,255,0.025);

  .send-btn {

  /* ── SUGGESTIONS (initial) ── */
  .suggestions-wrap {

  .suggestion-btn:hover { color:rgba(255,255,255,1); }
  .suggestion-sep { color:rgba(255,255,255,0.12); font-size:10px; padding:0 2px; user-select:none; }
  @media (max-width:640px) {

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const API_URL = 'https://show-me-turkiye-chat.info-f80.workers.dev';

const SUGGESTIONS = [
  "10 days in Istanbul and Cappadocia",
  "A week along the Aegean coast",
  "Family trip to Antalya in summer",
  "Hidden gems of Eastern Anatolia",
  "Culinary journey through Gaziantep"
];

// ════════════════════════════════════════════════════
// QUICK REPLY MARKER PARSER
// ════════════════════════════════════════════════════
// Agent sends [QR_SINGLE: opt | opt | opt] or [QR_MULTI: ...] at end of message.
// We strip the marker from displayed text and use it to render buttons.

function parseQuickReplies(rawText) {
  const singleRe = /\[QR_SINGLE:\s*([^\]]+)\]/i;
  const multiRe = /\[QR_MULTI:\s*([^\]]+)\]/i;

  let mode = null;
  let options = [];
  let cleanText = rawText;

  const singleMatch = rawText.match(singleRe);
  const multiMatch = rawText.match(multiRe);

  if (singleMatch) {
    mode = 'single';
    options = singleMatch[1].split('|').map(s => s.trim()).filter(Boolean);
    cleanText = rawText.replace(singleRe, '').trim();
  } else if (multiMatch) {
    mode = 'multi';
    options = multiMatch[1].split('|').map(s => s.trim()).filter(Boolean);
    cleanText = rawText.replace(multiRe, '').trim();
  }

  return { cleanText, mode, options };
}

// ════════════════════════════════════════════════════
// MARKDOWN PARSER
// ════════════════════════════════════════════════════

function escapeHtml(s) {
  return s
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function parseInline(text) {
  let out = escapeHtml(text);
  out = out.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m, label, url) => {
    const safeUrl = url.replace(/"/g, '&quot;');
    return `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${label}</a>`;
  });
  out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  out = out.replace(/__([^_]+)__/g, '<strong>$1</strong>');
  out = out.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  out = out.replace(/(^|[^_])_([^_\n]+)_(?!_)/g, '$1<em>$2</em>');
  out = out.replace(/`([^`]+)`/g, '<code>$1</code>');
  return out;
}

function parseMarkdown(md) {
  if (!md) return '';
  const lines = md.split('\n');
  const out = [];
  let listType = null;
  let para = [];

  function flushPara() {
    if (para.length) {
      out.push(`<p>${parseInline(para.join(' '))}</p>`);
      para = [];
    }
  }
  function flushList() {
    if (listType) {
      out.push(`</${listType}>`);
      listType = null;
    }
  }

  for (let raw of lines) {
    const line = raw.trim();
    if (!line) { flushPara(); flushList(); continue; }
    if (/^(-{3,}|_{3,}|\*{3,})$/.test(line)) { flushPara(); flushList(); out.push('<hr>'); continue; }
    if (line.startsWith('> ')) { flushPara(); flushList(); out.push(`<blockquote>${parseInline(line.slice(2))}</blockquote>`); continue; }
    const ulMatch = line.match(/^[-*+]\s+(.+)$/);
    if (ulMatch) {
      flushPara();
      if (listType !== 'ul') { flushList(); out.push('<ul>'); listType = 'ul'; }
      out.push(`<li>${parseInline(ulMatch[1])}</li>`);
      continue;
    }
    const olMatch = line.match(/^\d+\.\s+(.+)$/);
    if (olMatch) {
      flushPara();
      if (listType !== 'ol') { flushList(); out.push('<ol>'); listType = 'ol'; }
      out.push(`<li>${parseInline(olMatch[1])}</li>`);
      continue;
    }
    if (line.startsWith('#')) {
      flushPara(); flushList();
      const headingText = line.replace(/^#+\s*/, '');
      out.push(`<p><strong>${parseInline(headingText)}</strong></p>`);
      continue;
    }
    flushList();
    para.push(line);
  }
  flushPara();
  flushList();
  return out.join('\n');
}

// ════════════════════════════════════════════════════
// COMPONENTS
// ════════════════════════════════════════════════════

function TypingDots() {
  return (
    <div className="msg-row assistant">
      <div className="typing-dots"><span/><span/><span/></div>
    </div>
  );
}

function MessageBubble({ message, isStreaming }) {
  // For streaming, parse markers but show clean text only
  const displayText = useMemo(() => {
    if (message.role === 'user') return message.content;
    return parseQuickReplies(message.content).cleanText;
  }, [message.content, message.role]);

  const html = useMemo(() => parseMarkdown(displayText), [displayText]);
  return (
    <div className={`msg-row ${message.role}`}>
      <div
        className="msg-bubble"
        dangerouslySetInnerHTML={{
          __html: isStreaming ? html + '<span class="stream-cursor"></span>' : html
        }}
      />
    </div>
  );
}

function QuickReplies({ mode, options, onSubmit, disabled }) {
  const [selected, setSelected] = useState([]);

  if (!mode || !options.length) return null;

  const toggle = (opt) => {
    if (mode === 'single') {
      // Single: send immediately on click
      onSubmit([opt]);
      return;
    }
    // Multi: toggle selection
    setSelected(prev =>
      prev.includes(opt) ? prev.filter(o => o !== opt) : [...prev, opt]
    );
  };

  const handleContinue = () => {
    if (selected.length === 0) return;
    onSubmit(selected);
  };

  return (
    <div className="quick-replies-container">
      <div className="quick-replies-label">
        {mode === 'multi' ? 'Birden fazla seçebilirsin' : 'Bir tane seç'}
      </div>
      <div className="quick-replies-row">
        {options.map((opt, i) => (
          <button
            key={i}
            className={`quick-reply-btn ${selected.includes(opt) ? 'selected' : ''}`}
            onClick={() => toggle(opt)}
            disabled={disabled}
          >
            {opt}
          </button>
        ))}
        {mode === 'multi' && (
          <button
            className="quick-replies-continue"
            onClick={handleContinue}
            disabled={disabled || selected.length === 0}
          >
            Devam et →
          </button>
        )}
      </div>
    </div>
  );
}

function App() {
  const [input, setInput] = useState('');
  const [messages, setMessages] = useState([]);
  const [isTyping, setIsTyping] = useState(false);
  const [streamingMsg, setStreamingMsg] = useState(null);
  const [hasStarted, setHasStarted] = useState(false);
  const [error, setError] = useState(null);
  const textareaRef = useRef(null);
  const bottomRef = useRef(null);

  const scrollToBottom = useCallback(() => {
    if (bottomRef.current) {
      bottomRef.current.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }
  }, []);

  // Load saved chat (using v4 key for fresh start with new prompt)
  useEffect(() => {
    try {
      const saved = localStorage.getItem('smt-chat-v4');
      if (saved) {
        const p = JSON.parse(saved);
        if (Array.isArray(p) && p.length) {
          setMessages(p);
          setHasStarted(true);
        }
      }
    } catch (e) {
      console.warn('Failed to load saved chat:', e);
    }
  }, []);

  // Save + scroll
  useEffect(() => {
    if (messages.length) {
      try { localStorage.setItem('smt-chat-v4', JSON.stringify(messages)); } catch(e) {}
      setTimeout(scrollToBottom, 80);
    }
    const resetBtn = document.getElementById('resetBtn');
    if (resetBtn) resetBtn.style.display = messages.length > 0 ? 'flex' : 'none';
  }, [messages, scrollToBottom]);

  // Reset button
  useEffect(() => {
    const resetBtn = document.getElementById('resetBtn');
    if (!resetBtn) return;
    const handler = () => {
      if (confirm('Sohbeti sıfırlamak istediğinden emin misin? Mevcut plan silinecek.')) {
        setMessages([]);
        setHasStarted(false);
        setError(null);
        try { localStorage.removeItem('smt-chat-v4'); } catch(e) {}
      }
    };
    resetBtn.addEventListener('click', handler);
    return () => resetBtn.removeEventListener('click', handler);
  }, []);

  useEffect(() => {
    setTimeout(() => textareaRef.current?.focus(), 200);
  }, []);

  const send = useCallback(async (text) => {
    const t = (text || input).trim();
    if (!t || isTyping) return;

    setInput('');
    setError(null);
    setHasStarted(true);

    const userMsg = { role: 'user', content: t };
    const next = [...messages, userMsg];
    setMessages(next);
    setIsTyping(true);
    setTimeout(scrollToBottom, 60);

    try {
      const apiMessages = next.map(m => ({
        role: m.role === 'assistant' ? 'assistant' : 'user',
        content: m.content
      }));

      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: apiMessages, stream: false })
      });

      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error(errData.error || `Server error (${response.status})`);
      }

      const data = await response.json();
      const reply = data.reply;

      setIsTyping(false);

      if (reply) {
        setMessages(p => [...p, { role: 'assistant', content: reply }]);
      } else {
        throw new Error('Empty response');
      }
      setTimeout(scrollToBottom, 60);

    } catch(e) {
      console.error('Chat error:', e);
      setIsTyping(false);
      setError(e.message || 'Bir şey ters gitti, tekrar dene.');
      setInput(t);
    }
  }, [input, messages, isTyping, scrollToBottom]);

  const handleKey = e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  };

  // Quick replies based on last AI message markers
  const lastAiMessage = useMemo(() => {
    return [...messages].reverse().find(m => m.role === 'assistant');
  }, [messages]);

  const quickReplyData = useMemo(() => {
    if (!lastAiMessage) return { mode: null, options: [] };
    if (isTyping || streamingMsg) return { mode: null, options: [] };
    return parseQuickReplies(lastAiMessage.content);
  }, [lastAiMessage, isTyping, streamingMsg]);

  const handleQuickReplySubmit = useCallback((selected) => {
    // Join multiple selections with commas
    const text = selected.join(', ');
    send(text);
  }, [send]);

  return (
    <div className="chat-stage">
      <div className="badge">AI Travel Companion</div>
      <h1 className="main-title">Design Your Trip</h1>

      {!hasStarted && (
        <p className="main-subtitle">
          Tell us roughly what you're thinking — how many days, when, who's coming. We'll build the rest together.
        </p>
      )}

      {hasStarted && (
        <div className="conv-history">
          {messages.map((m, i) => (
            <MessageBubble key={i} message={m} />
          ))}
          {streamingMsg && (
            <MessageBubble message={streamingMsg} isStreaming />
          )}
          {isTyping && <TypingDots/>}
          <div ref={bottomRef} />
        </div>
      )}

      {error && (
        <div className="error-banner">{error}</div>
      )}

      {/* Quick replies — ABOVE the input now */}
      {hasStarted && quickReplyData.mode && (
        <QuickReplies
          mode={quickReplyData.mode}
          options={quickReplyData.options}
          onSubmit={handleQuickReplySubmit}
          disabled={isTyping}
        />
      )}

      <div className="input-wrap">
        <textarea
          ref={textareaRef}
          className="chat-input"
          placeholder={hasStarted
            ? "Ya da kendi cevabını yaz…"
            : "e.g. 7 days in Istanbul and Cappadocia in May"}
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={handleKey}
          rows={hasStarted ? 2 : 3}
          disabled={isTyping}
        />
        <div className="input-footer">
          <span className="input-hint">
            {input.length > 0 ? 'Enter ↵ to send' : 'Enter ↵ · Shift+Enter for new line'}
          </span>
          <button
            className="send-btn"
            onClick={() => send()}
            disabled={isTyping || !input.trim()}
          >
            Send
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/>
              <polyline points="12 5 19 12 12 19"/>
            </svg>
          </button>
        </div>
        <div className="input-glow"/>
      </div>

      {!hasStarted && (
        <div className="suggestions-wrap">
          <div className="suggestions-label">Try one of these</div>
          <div className="suggestions-row">
            {SUGGESTIONS.map((s, i) => (
              <span key={i} style={{ display: 'flex', alignItems: 'center' }}>
                <button className="suggestion-btn" onClick={() => send(s)}>
                  {s}
                </button>
                {i < SUGGESTIONS.length - 1 && <span className="suggestion-sep">·</span>}
              </span>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>

<script>
(function() {
  const c = document.getElementById('topo-canvas');
  if (!c) return;
  const ctx = c.getContext('2d');
  let w, h, t = 0, lines = [];
  function resize() {
    w = c.width = window.innerWidth;
    h = c.height = window.innerHeight;
    lines = [];
    const count = Math.floor(h / 28);
    for (let i = 0; i < count; i++) {
      lines.push({
        y: (i / count) * h,
        amp: 6 + Math.random() * 8,
        freq: 0.003 + Math.random() * 0.005,
        phase: Math.random() * Math.PI * 2,
        speed: 0.003 + Math.random() * 0.004
      });
    }
  }
  function draw() {
    ctx.clearRect(0, 0, w, h);
    ctx.lineWidth = 0.5;
    for (const line of lines) {
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(196,162,101,0.05)';
      for (let x = 0; x <= w; x += 4) {
        const y = line.y + Math.sin(x * line.freq + line.phase + t * line.speed) * line.amp;
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    t += 1;
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize);
  resize();
  draw();
})();
</script>
