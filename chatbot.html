<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Your Trip — Show Me Türkiye</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --black: #0a0c0e;
    --teal: #c4a265;
    --teal-light: #d4b87e;
    --teal-dim: rgba(196,162,101,0.18);
    --muted: rgba(255,255,255,0.72);
    --border: rgba(255,255,255,0.06);
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--black); }

  /* ── TOPO CANVAS ── */
  #topo-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

  /* ── AMBIENT POOLS ── */
  .ambient-tl {
    position:fixed; left:-15%; top:-10%; width:55vw; height:55vh;
    background:radial-gradient(ellipse, rgba(26,138,125,0.09) 0%, transparent 70%);
    pointer-events:none; z-index:0;
    animation:breathe 9s ease-in-out infinite;
  }
  .ambient-br {
    position:fixed; right:-10%; bottom:-5%; width:50vw; height:50vh;
    background:radial-gradient(ellipse, rgba(26,138,125,0.06) 0%, transparent 70%);
    pointer-events:none; z-index:0;
    animation:breathe 12s ease-in-out infinite reverse;
  }
  @keyframes breathe {
    0%,100%{transform:scale(1);opacity:1;}
    50%{transform:scale(1.08);opacity:0.7;}
  }

  /* ── GHOST CHAT LAYER (background emphasis) ── */
  .ghost-layer {
    position:fixed; inset:0; z-index:1; pointer-events:none;
    overflow:hidden;
  }
  .ghost-bubble {
    position:absolute;
    font-family:'Poppins',sans-serif; font-weight:300;
    font-size:13px; line-height:1.7; color:#fff;
    filter:blur(3px);
    opacity:0;
    animation:ghostFade 14s ease-in-out infinite;
  }
  @keyframes ghostFade {
    0%,100%{opacity:0;transform:translateY(6px);}
    20%,80%{opacity:0.07;}
    50%{opacity:0.11;}
  }
  .ghost-bubble.user {
    text-align:right;
    border-right:1px solid rgba(26,138,125,0.3);
    padding-right:14px;
    max-width:340px;
  }
  .ghost-bubble.ai {
    border-left:1px solid rgba(255,255,255,0.2);
    padding-left:14px;
    max-width:420px;
  }

  /* ── NAV ── */
  .nav {
    position:fixed; top:0; left:0; right:0;
    display:flex; align-items:center; justify-content:space-between;
    padding:28px 52px; z-index:100;
  }
  .nav-logo { height:38px; object-fit:contain; filter:brightness(0) invert(1) opacity(0.85); }
  .nav-right {
    font-family:'Poppins',sans-serif; font-size:10px; font-weight:400;
    letter-spacing:0.22em; text-transform:uppercase;
    color:rgba(255,255,255,0.3);
  }

  /* ── MAIN STAGE ── */
  #app {
    position:relative; z-index:2;
    width:100%; height:100vh;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:100px 24px 80px;
  }

  .chat-stage { width:100%; max-width:780px; display:flex; flex-direction:column; align-items:center; }

  /* ── BADGE ── */
  .badge {
    font-family:'Poppins',sans-serif; font-size:9px; font-weight:400;
    letter-spacing:0.3em; text-transform:uppercase;
    color:var(--teal-light);
    border:1px solid rgba(26,138,125,0.3);
    padding:7px 20px; margin-bottom:24px;
    background:rgba(26,138,125,0.06);
  }

  /* ── HEADING ── */
  .main-title {
    font-family:'Playfair Display', serif;
    font-size:clamp(30px,4.2vw,56px);
    font-weight:300; letter-spacing:0.3em; text-transform:uppercase;
    color:#fff; text-align:center; margin-bottom:16px; line-height:1.1;
  }
  .main-subtitle {
    font-family:'Poppins',sans-serif; font-weight:300;
    font-size:13px; color:var(--muted); text-align:center;
    max-width:500px; line-height:1.75; margin-bottom:40px;
    letter-spacing:0.02em;
  }

  /* ── CONVERSATION HISTORY ── */
  .conv-history {
    width:100%; max-height:260px;
    overflow-y:auto; overflow-x:hidden;
    margin-bottom:0; display:flex; flex-direction:column; gap:14px;
    padding:0 2px 18px; scrollbar-width:none;
  }
  .conv-history::-webkit-scrollbar { display:none; }

  .msg-row { display:flex; animation:msgIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards; opacity:0; }
  @keyframes msgIn {
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
  }
  .msg-row.user { justify-content:flex-end; }
  .msg-row.ai   { justify-content:flex-start; }

  .msg-bubble {
    max-width:78%; font-family:'Poppins',sans-serif; font-size:13.5px;
    line-height:1.75; font-weight:400;
  }
  .msg-row.user .msg-bubble {
    background:rgba(26,138,125,0.16);
    border:1px solid rgba(26,138,125,0.3);
    padding:12px 18px;
    color:rgba(255,255,255,1);
  }
  .msg-row.ai .msg-bubble {
    color:rgba(255,255,255,0.92);
    border-left:2px solid var(--teal-light);
    padding-left:16px;
    font-weight:300;
  }

  /* ── TYPING ── */
  .typing-dots { display:flex; align-items:center; gap:5px; height:20px; padding-left:16px; border-left:2px solid var(--teal-light); }
  .typing-dots span {
    width:5px; height:5px; border-radius:50%;
    background:var(--teal-light); opacity:0.5;
    animation:dot 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2){animation-delay:0.2s;}
  .typing-dots span:nth-child(3){animation-delay:0.4s;}
  @keyframes dot{0%,60%,100%{transform:translateY(0);opacity:0.4;}30%{transform:translateY(-5px);opacity:1;}}

  /* ── INPUT WRAP — no border-radius, sharp architectural ── */
  .input-wrap {
    position:relative; width:100%;
    border:1px solid rgba(255,255,255,0.07);
    background:rgba(255,255,255,0.025);
    backdrop-filter:blur(28px);
    transition:border-color 0.35s, box-shadow 0.35s;
  }
  .input-wrap:focus-within {
    border-color:var(--teal);
    box-shadow:0 0 0 1px rgba(26,138,125,0.2), 0 0 32px rgba(26,138,125,0.08);
  }

  /* Teal glow beneath input */
  .input-glow {
    position:absolute; bottom:-32px; left:50%;
    transform:translateX(-50%);
    width:80%; height:64px;
    background:radial-gradient(ellipse, rgba(26,138,125,0.35) 0%, transparent 70%);
    pointer-events:none; filter:blur(14px);
    animation:glowPulse 4s ease-in-out infinite; z-index:-1;
  }
  @keyframes glowPulse{
    0%,100%{opacity:1;transform:translateX(-50%) scaleX(1);}
    50%{opacity:0.8;transform:translateX(-50%) scaleX(1.1);}
  }

  textarea.chat-input {
    width:100%; min-height:100px; max-height:200px;
    background:transparent; border:none; outline:none; resize:none;
    color:#fff;
    font-family:'Poppins',sans-serif; font-weight:300; font-size:15px;
    line-height:1.65; letter-spacing:0.01em;
    padding:26px 28px 16px;
    caret-color:var(--teal-light);
  }
  textarea.chat-input::placeholder { color:rgba(255,255,255,0.42); }

  .input-footer {
    display:flex; align-items:center; justify-content:space-between;
    padding:0 16px 14px 28px;
    border-top:1px solid rgba(255,255,255,0.04);
  }
  .input-hint {
    font-family:'Poppins',sans-serif; font-size:10px; font-weight:300;
    letter-spacing:0.12em; color:rgba(255,255,255,0.42);
  }

  /* ── CTA SEND BTN — sharp, no radius ── */
  .send-btn {
    padding:0 24px; height:40px;
    background:var(--teal);
    border:none; cursor:pointer;
    display:flex; align-items:center; gap:9px;
    color:#fff; font-family:'Poppins',sans-serif; font-size:10px;
    font-weight:500; letter-spacing:0.22em; text-transform:uppercase;
    box-shadow:0 4px 20px rgba(26,138,125,0.3);
    transition:all 0.3s; white-space:nowrap;
  }
  .send-btn:hover { background:var(--teal-light); box-shadow:0 6px 28px rgba(26,138,125,0.5); }
  .send-btn:disabled { opacity:0.35; cursor:default; }

  /* ── SUGGESTIONS ── */
  .suggestions-wrap {
    margin-top:34px; width:100%;
    display:flex; flex-direction:column; align-items:center; gap:13px;
  }
  .suggestions-label {
    font-family:'Poppins',sans-serif; font-size:9px; font-weight:400;
    letter-spacing:0.32em; text-transform:uppercase; color:rgba(255,255,255,0.52);
  }
  .suggestions-row {
    display:flex; align-items:center; justify-content:center;
    flex-wrap:wrap; row-gap:10px;
  }
  .suggestion-item { display:flex; align-items:center; }
  .suggestion-btn {
    font-family:'Poppins',sans-serif; font-weight:300; font-size:12px;
    color:rgba(255,255,255,0.62); background:none; border:none; cursor:pointer;
    padding:4px 7px; white-space:nowrap; letter-spacing:0.03em;
    transition:color 0.3s;
  }
  .suggestion-btn:hover { color:rgba(255,255,255,1); }
  .suggestion-sep { color:rgba(255,255,255,0.12); font-size:10px; padding:0 6px; user-select:none; }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    position:fixed; bottom:30px; right:48px;
    display:flex; align-items:center; gap:18px; z-index:50;
  }
  .slide-counter {
    font-family:'Poppins',sans-serif; font-size:11px; font-weight:400;
    color:rgba(255,255,255,0.55); letter-spacing:0.12em;
    display:flex; align-items:center; gap:12px;
  }
  .slide-line { width:38px; height:1px; background:rgba(255,255,255,0.15); }
  .sparkle-btn {
    width:30px; height:30px; cursor:pointer;
    opacity:0.55; transition:opacity 0.3s, transform 0.4s;
    background:none; border:none; padding:0;
  }
  .sparkle-btn:hover { opacity:0.95; transform:rotate(18deg) scale(1.12); }

  .reset-btn {
    position:fixed; bottom:30px; left:48px;
    font-family:'Poppins',sans-serif; font-size:9px; font-weight:400;
    letter-spacing:0.2em; text-transform:uppercase;
    color:rgba(255,255,255,0.45); background:none; border:none; cursor:pointer;
    transition:color 0.3s;
  }
  .reset-btn:hover { color:rgba(255,255,255,0.85); }

  /* ── TWEAKS PANEL ── */
  .tweaks-panel {
    position:fixed; bottom:72px; right:48px; width:234px;
    background:rgba(10,12,14,0.97);
    border:1px solid rgba(255,255,255,0.08);
    padding:20px; z-index:200;
    backdrop-filter:blur(20px);
    display:none; flex-direction:column; gap:15px;
    box-shadow:0 20px 60px rgba(0,0,0,0.7);
  }
  .tweaks-panel.open { display:flex; }
  .tweaks-title {
    font-family:'Poppins',sans-serif; font-size:9px; font-weight:500;
    letter-spacing:0.25em; text-transform:uppercase;
    color:rgba(255,255,255,0.65); padding-bottom:10px;
    border-bottom:1px solid rgba(255,255,255,0.06);
  }
  .tweak-row { display:flex; flex-direction:column; gap:6px; }
  .tweak-label { font-family:'Poppins',sans-serif; font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,255,255,0.58); }
  .tweak-select, .tweak-range {
    width:100%; background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.07);
    color:#fff; padding:6px 10px;
    font-family:'Poppins',sans-serif; font-size:11px;
    outline:none; cursor:pointer; border-radius:0;
  }
  .tweak-range { padding:4px 0; background:transparent; border:none; }

  @media(max-width:640px){
    .nav { padding:20px 24px; }
    #app { padding:80px 16px 80px; }
    .main-title { font-size:27px; letter-spacing:0.18em; }
    .bottom-bar { right:24px; }
    .reset-btn { left:24px; }
  }
</style>
<template id="__bundler_thumbnail" data-bg-color="#0a0c0e">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="1200" height="800" fill="#0a0c0e"/>

    <g opacity="0.18" stroke="#c4a265" stroke-width="0.8" fill="none">
      <path d="M0,300 Q300,260 600,300 Q900,340 1200,300"/>

    <rect x="280" y="380" width="640" height="120" fill="none" stroke="rgba(196,162,101,0.3)" stroke-width="1"/>

<body>

<canvas id="topo-canvas"></canvas>
<div class="ambient-tl"></div>
<div class="ambient-br"></div>

<!-- Ghost chat layer -->
<div class="ghost-layer" id="ghostLayer"></div>

<!-- Nav: logo only -->
<nav class="nav">

</nav>

<div id="app"></div>

<!-- Bottom UI -->
<div class="bottom-bar">
  <div class="slide-counter">
    <span>01</span>
    <div class="slide-line"></div>
  </div>
  <button class="sparkle-btn" id="sparkleBtn" aria-label="Tweaks">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" width="30" height="30">
      <path d="M16 2 L17.8 13.2 L28 14 L17.8 14.8 L16 26 L14.2 14.8 L4 14 L14.2 13.2 Z" fill="rgba(255,255,255,0.85)"/>
      <path d="M26 4 L26.9 9.1 L32 10 L26.9 10.9 L26 16 L25.1 10.9 L20 10 L25.1 9.1 Z" fill="rgba(255,255,255,0.4)"/>
      <path d="M6 22 L6.6 25.4 L10 26 L6.6 26.6 L6 30 L5.4 26.6 L2 26 L5.4 25.4 Z" fill="rgba(255,255,255,0.3)"/>
    </svg>
  </button>
</div>

<button class="reset-btn" id="resetBtn">↺ New Conversation</button>

<!-- Tweaks Panel -->
<div class="tweaks-panel" id="tweaksPanel">
  <div class="tweaks-title">Tweaks</div>
  <div class="tweak-row">
    <div class="tweak-label">Topo Intensity</div>
    <input type="range" class="tweak-range" id="topoRange" min="0.02" max="0.2" step="0.01" value="0.15">
  </div>
  <div class="tweak-row">
    <div class="tweak-label">Input Glow</div>
    <input type="range" class="tweak-range" id="glowRange" min="0" max="1" step="0.05" value="1">
  </div>
  <div class="tweak-row">
    <div class="tweak-label">Ghost Opacity</div>
    <input type="range" class="tweak-range" id="ghostRange" min="0" max="0.25" step="0.01" value="0.1">
  </div>
  <div class="tweak-row">
    <div class="tweak-label">Accent</div>
    <select class="tweak-select" id="accentSelect">
      <option value="teal">Teal</option>
      <option value="gold" selected>Gold</option>
      <option value="rose">Rose</option>
    </select>
  </div>
</div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "topoIntensity": 0.2,
  "glowIntensity": 1,
  "ghostOpacity": 0.21,
  "accentColor": "gold"
}/*EDITMODE-END*/;

const SUGGESTIONS = [
  "10 days in Istanbul and Cappadocia…",
  "Aegean coast highlights in a week…",
  "Hidden gems of Eastern Anatolia…",
  "Family trip to Antalya and Pamukkale…",
  "Culinary journey through Gaziantep…",
];

const SYSTEM_PROMPT = `You are a luxury AI travel concierge for "Show Me Türkiye". Your role is to craft precise, personalised itineraries for Türkiye. The user will describe their duration and destinations. Respond with a clear, elegant day-by-day itinerary with brief but evocative descriptions. Be concise and practical. Use a sophisticated, professional tone — never generic. Format with days clearly labelled.`;

function TypingDots() {
  return (
    <div className="msg-row ai">
      <div className="typing-dots"><span/><span/><span/></div>
    </div>
  );
}

function App() {
  const [input, setInput] = useState('');
  const [messages, setMessages] = useState([]);
  const [isTyping, setIsTyping] = useState(false);
  const [hasStarted, setHasStarted] = useState(false);
  const textareaRef = useRef(null);
  const historyRef = useRef(null);

  const scroll = () => {
    if (historyRef.current) historyRef.current.scrollTop = historyRef.current.scrollHeight;
  };

  useEffect(() => {
    const saved = localStorage.getItem('smt-chat-v2');
    if (saved) {
      const p = JSON.parse(saved);
      if (p.length) { setMessages(p); setHasStarted(true); }
    }
  }, []);

  useEffect(() => {
    if (messages.length) {
      localStorage.setItem('smt-chat-v2', JSON.stringify(messages));
      setTimeout(scroll, 60);
    }
  }, [messages]);

  const send = useCallback(async (text) => {
    const t = (text || input).trim();
    if (!t || isTyping) return;
    setInput('');
    setHasStarted(true);
    const userMsg = { role:'user', content:t };
    const next = [...messages, userMsg];
    setMessages(next);
    setIsTyping(true);
    setTimeout(scroll, 60);

    try {
      const history = next.map(m => `${m.role === 'user' ? 'User' : 'Assistant'}: ${m.content}`).join('\n');
      const reply = await window.claude.complete({
        messages:[{ role:'user', content: SYSTEM_PROMPT + '\n\n' + history }]
      });
      setMessages(p => [...p, { role:'ai', content:reply }]);
    } catch(e) {
      setMessages(p => [...p, { role:'ai', content:'Something went quiet… Please try again.' }]);
    } finally {
      setIsTyping(false);
      setTimeout(scroll, 100);
    }
  }, [input, messages, isTyping]);

  const handleKey = e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  };

  const useSuggestion = s => {
    setInput(s.replace('…',''));
    textareaRef.current?.focus();
  };

  return (
    <div className="chat-stage">
      <div className="badge">Curated AI-Powered Travel Planning</div>
      <h1 className="main-title">Design Your Trip</h1>

      {!hasStarted && (
        <p className="main-subtitle">
          Stop searching, start experiencing. Tell us your dates and destinations, and let us give you a personalised itinerary to optimise your time in Türkiye.
        </p>
      )}

      {hasStarted && (
        <div className="conv-history" ref={historyRef}>
          {messages.map((m, i) => (
            <div key={i} className={`msg-row ${m.role}`} style={{animationDelay:`${Math.min(i*0.04,0.25)}s`}}>
              <div className="msg-bubble">{m.content}</div>
            </div>
          ))}
          {isTyping && <TypingDots/>}
        </div>
      )}

      <div className="input-wrap">
        <textarea
          ref={textareaRef}
          className="chat-input"
          placeholder="e.g. 10 days in Istanbul and Antalya. I love history and local food."
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={handleKey}
          rows={3}
        />
        <div className="input-footer">
          <span className="input-hint">
            {input.length > 0 ? 'Enter ↵ to send' : 'Enter ↵ · Shift+Enter for new line'}
          </span>
          <button className="send-btn" onClick={() => send()} disabled={isTyping || !input.trim()}>
            Show Me Türkiye
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
          </button>
        </div>
        <div className="input-glow" id="inputGlow"/>
      </div>

      {!hasStarted && (
        <div className="suggestions-wrap">
          <div className="suggestions-label">Curated Suggestions</div>
          <div className="suggestions-row">
            {SUGGESTIONS.map((s,i) => (
              <div key={i} className="suggestion-item">
                <button className="suggestion-btn" onClick={() => useSuggestion(s)}>{s}</button>
                {i < SUGGESTIONS.length - 1 && <span className="suggestion-sep">—</span>}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
document.getElementById('resetBtn').addEventListener('click', () => {
  localStorage.removeItem('smt-chat-v2');
  window.location.reload();
});
</script>

<script>
// ── TOPOGRAPHIC CANVAS ────────────────────────────────────────────
const canvas = document.getElementById('topo-canvas');
const ctx = canvas.getContext('2d');
let topoAlpha = 0.15;

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

function drawTopo() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const W = canvas.width, H = canvas.height;
  const t = Date.now() * 0.00025;
  for (let layer = 0; layer < 18; layer++) {
    const baseY = H * 0.2 + layer * (H * 0.043);
    const amp = 24 + layer * 5;
    const freq = 0.0022 + layer * 0.00018;
    const phase = layer * 1.15 + t;
    ctx.beginPath(); ctx.moveTo(0, baseY);
    for (let x = 0; x <= W; x += 4) {
      const y = baseY
        + Math.sin(x * freq + phase) * amp
        + Math.sin(x * freq * 1.8 + phase * 0.75) * amp * 0.35
        + Math.sin(x * freq * 0.45 + phase * 1.4) * amp * 0.55;
      ctx.lineTo(x, y);
    }
    const dist = Math.abs(layer - 9) / 9;
    const a = topoAlpha * (1 - dist * 0.4);
    ctx.strokeStyle = layer % 3 === 0
      ? `rgba(26,138,125,${a})`
      : `rgba(255,255,255,${a * 0.5})`;
    ctx.lineWidth = layer % 4 === 0 ? 0.9 : 0.4;
    ctx.stroke();
  }
  requestAnimationFrame(drawTopo);
}
drawTopo();

// ── GHOST CHAT BUBBLES ────────────────────────────────────────────
const ghostMessages = [
  { role:'user', text:'7 days in Istanbul, architecture and Bosphorus sunsets.' },
  { role:'ai',  text:'Day 1: Arrive in Sultanahmet. Blue Mosque at dusk, dinner in Karaköy.' },
  { role:'user', text:'Add Cappadocia to the route, 4 extra days.' },
  { role:'ai',  text:'Day 8: Fly to Nevşehir. Hot air balloon at dawn over the fairy chimneys.' },
  { role:'user', text:'Something quieter. Eastern Black Sea coast, traditional villages.' },
  { role:'ai',  text:'Ayder Plateau, Uzungöl lake, Hemşin valleys. Untouched and extraordinary.' },
];

const ghostPositions = [
  { top:'12%', left:'4%',  delay:'0s'  },
  { top:'22%', right:'5%', delay:'3s'  },
  { top:'58%', left:'3%',  delay:'6s'  },
  { top:'68%', right:'4%', delay:'9s'  },
  { top:'82%', left:'5%',  delay:'2s'  },
  { top:'38%', right:'3%', delay:'11s' },
];

const ghostLayer = document.getElementById('ghostLayer');
ghostMessages.forEach((m, i) => {
  const p = ghostPositions[i] || ghostPositions[i % ghostPositions.length];
  const el = document.createElement('div');
  el.className = `ghost-bubble ${m.role}`;
  el.textContent = m.text;
  Object.assign(el.style, {
    top: p.top || 'auto',
    left: p.left || 'auto',
    right: p.right || 'auto',
    bottom: p.bottom || 'auto',
    animationDelay: p.delay,
    animationDuration: `${14 + i * 2}s`,
  });
  ghostLayer.appendChild(el);
});

// Ghost opacity tweak
let ghostOpacity = 0.1;
function applyGhostOpacity(v) {
  document.querySelectorAll('.ghost-bubble').forEach(el => {
    el.style.setProperty('--ghost-max', v);
  });
  // Re-inject keyframe
  let style = document.getElementById('ghost-style');
  if (!style) { style = document.createElement('style'); style.id='ghost-style'; document.head.appendChild(style); }
  style.textContent = `@keyframes ghostFade {
    0%,100%{opacity:0;transform:translateY(6px);}
    20%,80%{opacity:${v * 0.7};}
    50%{opacity:${v};}
  }`;
}
applyGhostOpacity(ghostOpacity);

// ── TWEAKS ────────────────────────────────────────────────────────
const sparkleBtn = document.getElementById('sparkleBtn');
const tweaksPanel = document.getElementById('tweaksPanel');
sparkleBtn.addEventListener('click', () => tweaksPanel.classList.toggle('open'));

document.getElementById('topoRange').addEventListener('input', e => {
  topoAlpha = parseFloat(e.target.value);
  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{topoIntensity: topoAlpha}}, '*');
});

document.getElementById('glowRange').addEventListener('input', e => {
  document.getElementById('inputGlow').style.opacity = e.target.value;
  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{glowIntensity: parseFloat(e.target.value)}}, '*');
});

document.getElementById('ghostRange').addEventListener('input', e => {
  applyGhostOpacity(parseFloat(e.target.value));
  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{ghostOpacity: parseFloat(e.target.value)}}, '*');
});

const ACCENTS = {
  teal: { main:'#1a8a7d', light:'#23b5a4' },
  gold: { main:'#c4a265', light:'#d4b87e' },
  rose: { main:'#b45064', light:'#cc6070' },
};
document.getElementById('accentSelect').addEventListener('change', e => {
  const c = ACCENTS[e.target.value];
  document.documentElement.style.setProperty('--teal', c.main);
  document.documentElement.style.setProperty('--teal-light', c.light);
  document.documentElement.style.setProperty('--teal-dim', `${c.main}2e`);
  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{accentColor: e.target.value}}, '*');
});

// Tweaks host protocol
window.addEventListener('message', e => {
  if (e.data?.type === '__activate_edit_mode')   tweaksPanel.classList.add('open');
  if (e.data?.type === '__deactivate_edit_mode') tweaksPanel.classList.remove('open');
});
window.parent.postMessage({type:'__edit_mode_available'}, '*');
</script>
</body>
